<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Module 05 — DOM & Events</title>
  </head>
  <body>
    <!-- Open this file in a browser, then open DevTools. -->
    <h1>DOM &amp; Events</h1>

    <button id="counter">Clicked 0 times</button>

    <!-- Event delegation: ONE listener on the <ul>, not one per <li>. -->
    <ul id="todos">
      <li>Read the lesson <button data-action="delete">x</button></li>
      <li>Do the exercises <button data-action="delete">x</button></li>
    </ul>

    <script type="module" src="./lesson.js"></script>
  </body>
</html>
